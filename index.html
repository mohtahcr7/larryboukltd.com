<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Larryboul Ltd</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --light: #f5f0e8;
    }

    body {
      background-color: var(--dark);
      color: var(--light);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.2s ease both;
    }

    .logo-line {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .line-deco {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
      animation: expand 1.5s ease 0.4s both;
    }
    .line-deco.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--light);
      line-height: 1;
    }

    h1 span {
      color: var(--gold);
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      margin-top: 1rem;
      animation: fadeUp 1.2s ease 0.3s both;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 2rem auto;
      animation: expand 1.5s ease 0.6s both;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(245,240,232,0.6);
      letter-spacing: 0.03em;
      animation: fadeUp 1.2s ease 0.6s both;
    }

    .coming-soon {
      margin-top: 3rem;
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.4);
      padding: 0.6rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadeUp 1.2s ease 0.9s both;
    }

    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      opacity: 0.25;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expand {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <div class="logo-line">
      <div class="line-deco"></div>
      <h1>Larryboul <span>Ltd</span></h1>
      <div class="line-deco right"></div>
    </div>
    <p class="subtitle">larryboukltd.com</p>
    <div class="divider"></div>
    <p class="tagline">Something remarkable is on its way.</p>
    <div class="coming-soon">Coming Soon</div>
  </div>

</body>
</html>
